# X automation — runs on GitHub even if your Mac is off.
#
# Required repo secrets (Settings → Secrets → Actions):
#   X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_TOKEN_SECRET
# Optional (smarter teasers + Grok trend scan):
#   ANTHROPIC_API_KEY, XAI_API_KEY
#
# State files (posted.json, promoted.json, trends_seen.json) are committed
# back to this repo after each run so nothing double-posts.

name: X Social Automation

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-social
  cancel-in-progress: false

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify X API (read + write)
        id: verify
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python3 x_scheduler.py status --write-test

      - name: Run calendar + blog promo + trend watcher
        if: steps.verify.outcome == 'success'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          BLOG_PROMO_TZ: Europe/Amsterdam
          BLOG_PROMO_HOUR: "9"
          TREND_MAX_PER_WEEK: "4"
        run: |
          python3 x_scheduler.py post
          python3 social/x_blog_promoter.py
          python3 social/x_trend_watcher.py

      - name: Commit state
        run: |
          git config user.email "murmur.red1@gmail.com"
          git config user.name "murmur-red"
          git add social/posted.json social/promoted.json social/trends_seen.json
          git diff --staged --quiet || git commit -m "x: update posting state [skip ci]"
          git push