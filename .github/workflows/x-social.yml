# X automation — article-first, 3 posts/week (Mon/Wed/Fri).
#
# When a new murmur.red blog article lands on Mon/Wed/Fri, post one X update
# with an AI-angled teaser + full article link (~$0.20/tweet with URL).
#
# Required secrets:
#   X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_TOKEN_SECRET
# Optional:
#   ANTHROPIC_API_KEY  (smart AI teasers — falls back to plain title if missing)
#   X_CREDIT_BALANCE_USD  (low-balance GitHub Issue alerts)
#
# Cost: ~3 posts/week × $0.20 ≈ $2.40/month if every post has a URL.

name: X Social Automation

on:
  # Poll often enough to post soon after articles go live (Mon–Fri).
  # Idle runs cost $0 on X API until a new article is promoted.
  schedule:
    - cron: "*/20 6-20 * * 1,3,5"   # Mon/Wed/Fri every 20 min, 06–20 UTC
    - cron: "0 8 * * 2,4"           # Tue/Thu once: credit check only (no promo days)
  workflow_dispatch:
    inputs:
      force_promo:
        description: "Force-promote latest unpromoted blog article now"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: x-social
  cancel-in-progress: false

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Promote article (Mon/Wed/Fri) + credit watch
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_PROMO_TZ: Europe/Amsterdam
          BLOG_PROMO_MAX_AGE_DAYS: "2"
          X_CREDIT_BALANCE_USD: ${{ secrets.X_CREDIT_BALANCE_USD }}
          X_CREDIT_WARN_USD: "5"
          X_CREDIT_CRITICAL_USD: "2"
          CREDIT_DAILY_PROBE: "false"
        run: |
          if [ "${{ inputs.force_promo }}" = "true" ]; then
            python3 social/x_blog_promoter.py --force
          else
            python3 social/x_blog_promoter.py
          fi
          python3 social/x_credit_watch.py check

      - name: Commit state
        run: |
          git config user.email "murmur.red1@gmail.com"
          git config user.name "murmur-red"
          git add social/promoted.json social/credits_state.json
          git diff --staged --quiet || git commit -m "x: update promo state [skip ci]"
          git push
